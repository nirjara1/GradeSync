<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeSync - Sign In</title>
    <!-- Use a modern, clean font like Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #8B0000;
            --primary-red-hover: #700000;
            --bg-gray: #f3f4f6;
            --card-bg: #ffffff;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --border-color: #d1d5db;
            --focus-ring: rgba(139, 0, 0, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-gray);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Top Header Bar */
        .header {
            width: 100%;
            height: 160px;
            background-color: var(--primary-red);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Circular University Logo */
        .logo-container {
            position: absolute;
            bottom: -50px;
            width: 100px;
            height: 100px;
            background-color: var(--card-bg);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            border: 4px solid var(--primary-red);
            z-index: 10;
        }

        .logo-container svg {
            width: 50px;
            height: 50px;
            color: var(--primary-red);
        }

        /* Login Card */
        .login-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 420px;
            margin-top: 80px;
            padding: 40px 32px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
        }

        .login-title {
            color: var(--text-dark);
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-align: center;
        }

        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dark);
            margin-left: 2px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-dark);
            transition: all 0.2s ease;
            background-color: #f9fafb;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-red);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .input-group input::placeholder {
            color: #9ca3af;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background-color: var(--primary-red);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .login-btn:hover {
            background-color: var(--primary-red-hover);
        }

        .login-btn:active {
            transform: translateY(1px);
        }

        .links-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 24px;
            width: 100%;
        }

        .links-container a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .links-container a:hover {
            color: var(--primary-red);
            text-decoration: underline;
        }

        .divider {
            width: 100%;
            height: 1px;
            background-color: var(--border-color);
            margin: 4px 0;
            opacity: 0.5;
        }

        .footer-text {
            margin-top: auto;
            margin-bottom: 30px;
            color: #9ca3af;
            font-size: 13px;
        }

        @media (max-width: 480px) {
            .header {
                height: 120px;
            }
            .logo-container {
                bottom: -40px;
                width: 80px;
                height: 80px;
                border-width: 3px;
            }
            .logo-container svg {
                width: 40px;
                height: 40px;
            }
            .login-card {
                width: 90%;
                margin-top: 60px;
                padding: 30px 24px;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-container">
            <!-- Academic/University style simple SVG logo -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 3L1 9L4 10.63V17.5C4 18.23 4.5 19 5.5 19.5C6.72 20.1 9 21 12 21C15 21 17.28 20.1 18.5 19.5C19.5 19 20 18.23 20 17.5V10.63L23 9L12 3ZM12 5.17L18.73 8.85L12 12.5L5.27 8.85L12 5.17ZM18 17.5C18 17.75 17.65 18.2 16.59 18.7C15.65 19.14 13.9 19.5 12 19.5C10.1 19.5 8.35 19.14 7.41 18.7C6.35 18.2 6 17.75 6 17.5V11.72L12 15L18 11.72V17.5Z"/>
                <path d="M22 11V17H20V12.1L22 11Z"/>
            </svg>
        </div>
    </header>

    <main class="login-card">
        <h1 class="login-title">Sign In</h1>
        
        <form class="login-form" action="" method="POST">
            <!-- If using inside Django, uncomment: {% csrf_token %} -->
            
            <div class="input-group">
                <label for="username">Email or Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your email or username" required autocomplete="username">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>

            <button type="submit" class="login-btn">LOGIN</button>
        </form>

        <div class="links-container">
            <a href="#">Forgot Password?</a>
            <div class="divider"></div>
            <a href="#">Create Account</a>
        </div>
    </main>

    <footer class="footer-text">
        &copy; 2026 GradeSync Portal. All rights reserved.
    </footer>

</body>
</html>
