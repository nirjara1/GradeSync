{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeSync - Student Portal</title>
    <!-- Use FontAwesome for sidebar icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Reusing the professor CSS for identical layout -->
    <link rel="stylesheet" href="{% static 'css/professor.css' %}?v=4.4">
    {% block extra_css %}{% endblock %}

    <!-- Dark Mode Load Script -->
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>

<body>

    <header class="top-header">
        <div class="maroon-band">
            <img src="{% static 'images/logo.png' %}" alt="ULM Seal" class="ulm-seal"
                onerror="this.src='https://via.placeholder.com/100x100.png?text=ULM+Seal'">
        </div>
        <div class="gold-line"></div>
        <div class="header-row">
            <a href="{% url 'student_dashboard' %}" style="text-decoration: none;">
                <h1 class="header-left-title">GradeSync</h1>
            </a>
            <div class="user-controls">
                <button id="themeToggleBtn" style="background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-main); margin-right: 15px; display: flex; align-items: center;" title="Toggle Dark/Light Mode">
                    <i class="fa-solid fa-moon" style="transition: transform 0.3s;"></i>
                </button>
                <span class="username">Welcome, <a href="{% url 'student_profile' %}" class="username-bold">{{ display_name }}</a></span>
                <div class="nav-separator"></div>
                <form method="post" action="{% url 'logout' %}" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="logout-link"
                        style="background: none; border: none; padding: 0; cursor: pointer; font-family: inherit; font-size: inherit;">LOG
                        OUT?</button>
                </form>
            </div>
        </div>
    </header>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <a href="{% url 'student_profile' %}" class="nav-item {% if request.resolver_match.url_name == 'student_profile' %}active{% endif %}">
                <i class="fa-solid fa-user-circle"></i>
                <span>Profile</span>
            </a>
            <a href="{% url 'student_dashboard' %}"
                class="nav-item {% if request.resolver_match.url_name == 'student_dashboard' %}active{% endif %}">
                <i class="fa-solid fa-gauge-high"></i>
                <span>Dashboard</span>
            </a>
            <a href="{% url 'student_courses_list' %}" class="nav-item {% if request.resolver_match.url_name == 'student_courses_list' %}active{% endif %}">
                <i class="fa-solid fa-book"></i>
                <span>Courses</span>
            </a>
            <a href="{% url 'student_assignments' %}" class="nav-item {% if request.resolver_match.url_name == 'student_assignments' %}active{% endif %}">
                <i class="fa-solid fa-book-open"></i>
                <span>Assignments</span>
            </a>
            <a href="{% url 'student_gradebook' %}" class="nav-item {% if request.resolver_match.url_name == 'student_gradebook' %}active{% endif %}">
                <i class="fa-solid fa-table-list"></i>
                <span>Gradebook</span>
            </a>
            <a href="{% url 'student_calendar' %}" class="nav-item {% if request.resolver_match.url_name == 'student_calendar' %}active{% endif %}">
                <i class="fa-regular fa-calendar-days"></i>
                <span>Calendar</span>
            </a>
            <a href="{% url 'execution_sandbox' %}" class="nav-item {% if request.resolver_match.url_name == 'execution_sandbox' %}active{% endif %}">
                <i class="fa-solid fa-code"></i>
                <span>Code Sandbox</span>
            </a>
            <a href="{% url 'student_inbox' %}" class="nav-item {% if request.resolver_match.url_name == 'student_inbox' %}active{% endif %}">
                <i class="fa-solid fa-inbox"></i>
                <span>Inbox</span>
            </a>
            <a href="{% url 'student_help' %}" class="nav-item {% if request.resolver_match.url_name == 'student_help' %}active{% endif %}">
                <i class="fa-solid fa-question-circle"></i>
                <span>Help</span>
            </a>
        </aside>

        <main class="main-content">
            {% block content %}
            {% endblock %}
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeBtn = document.getElementById('themeToggleBtn');
            const icon = themeBtn.querySelector('i');
            
            // Set initial icon based on applied theme
            if (document.documentElement.getAttribute('data-theme') === 'dark') {
                icon.classList.replace('fa-moon', 'fa-sun');
            }

            themeBtn.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                if (currentTheme === 'dark') {
                    document.documentElement.removeAttribute('data-theme');
                    localStorage.setItem('theme', 'light');
                    icon.classList.replace('fa-sun', 'fa-moon');
                    icon.style.transform = 'rotate(-360deg)';
                    showThemeOverlay('light');
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    localStorage.setItem('theme', 'dark');
                    icon.classList.replace('fa-moon', 'fa-sun');
                    icon.style.transform = 'rotate(360deg)';
                    showThemeOverlay('dark');
                }
            });
            
            function showThemeOverlay(mode) {
                const existing = document.getElementById('theme-overlay');
                if (existing) existing.remove();

                const overlay = document.createElement('div');
                overlay.id = 'theme-overlay';
                overlay.className = `theme-overlay-container ${mode === 'dark' ? 'theme-night-mode' : 'theme-day-mode'}`;

                const icon = document.createElement('i');
                icon.className = mode === 'dark' ? 'fa-solid fa-moon theme-overlay-icon' : 'fa-solid fa-sun theme-overlay-icon';

                const text = document.createElement('div');
                text.className = 'theme-overlay-text';
                text.innerText = mode === 'dark' ? 'NIGHT MODE' : 'DAY MODE';

                overlay.appendChild(icon);
                overlay.appendChild(text);
                document.body.appendChild(overlay);

                setTimeout(() => {
                    if (document.body.contains(overlay)) {
                        overlay.remove();
                    }
                }, 1500);
            }
        });
    </script>
</body>

</html>
