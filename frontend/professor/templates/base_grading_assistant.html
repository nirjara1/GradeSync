{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeSync - Grading Assistant Dashboard</title>
    <!-- Use FontAwesome for sidebar icons to match screenshot -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/professor.css' %}?v=3.1">
</head>

<body>

    <header class="top-header">
        <div class="maroon-band">
            <!-- Using a generic placeholder for the ULM seal, but styling perfectly for it -->
            <img src="{% static 'images/ulm_logo.png' %}" alt="ULM Seal" class="ulm-seal"
                onerror="this.src='https://via.placeholder.com/100x100.png?text=ULM+Seal'">
            <div class="vertical-separator"></div>
            <h1 class="gradesync-logo">GradeSync</h1>
        </div>
        <div class="gold-line"></div>
        <div class="header-row">
            <a href="{% url 'ga_dashboard' %}" style="text-decoration: none;">
                <h1 class="header-left-title">GradeSync</h1>
            </a>
            <div class="user-controls">
                <span class="username">Welcome, <a href="{% url 'user_profile' %}" class="username-bold">{{ display_name }}</a></span>
                <div class="nav-separator"></div>
                <form method="post" action="{% url 'logout' %}" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="logout-link"
                        style="background: none; border: none; padding: 0; cursor: pointer; font-family: inherit; font-size: inherit;">LOG
                        OUT?</button>
                </form>
            </div>
        </div>
    </header>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <a href="#" class="nav-item">
                <i class="fa-solid fa-user-circle"></i>
                <span>Profile</span>
            </a>
            <a href="{% url 'ga_dashboard' %}"
                class="nav-item {% if request.resolver_match.url_name == 'ga_dashboard' %}active{% endif %}">
                <i class="fa-solid fa-gauge-high"></i>
                <span>Dashboard</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-book"></i>
                <span>Courses</span>
            </a>
            <a href="{% url 'assignments_dashboard' %}"
                class="nav-item {% if request.resolver_match.url_name == 'assignments_dashboard' %}active{% endif %}">
                <i class="fa-solid fa-book-open"></i>
                <span>Assignments</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-file-contract"></i>
                <span>Reports</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-inbox"></i>
                <span>Inbox</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-question-circle"></i>
                <span>Help</span>
            </a>
        </aside>

        <main class="main-content">
            {% block content %}
            {% endblock %}
        </main>
    </div>

</body>

</html>
