services:
  db:
    restart: always
    image: postgres:16
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # Catches outbound mail in dev (SMTP → web UI). Open http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  web:
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      # Execution sandbox settings (override in .env if needed)
      - EXECUTION_TIMEOUT_SECONDS=10
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      # Email: defaults target Mailpit (docker-compose service). Override in .env for real SMTP.
      - SITE_URL=${SITE_URL:-http://localhost:8000}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-mailpit}
      - EMAIL_PORT=${EMAIL_PORT:-1025}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-0}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-GradeSync <noreply@gradesync.local>}
    volumes:
      - ./backend:/app
      - ./autograder_ai:/autograder_ai
      - media_data:/app/media
      - ./app/data:/app/data
      - ./frontend:/frontend
      # Mount Docker socket so Django can spawn sibling containers (DooD pattern)
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared sandbox directory — same path on host AND inside this container.
      # Django writes student code here; the host Docker daemon can then find it
      # when we pass this path to `docker run -v ...` from inside this container.
      - /tmp/gradesync_sandbox:/tmp/gradesync_sandbox
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - mailpit
    # Apply migrations on start so new tables (e.g. StudentOnboarding) exist after git pull
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - EXECUTION_TIMEOUT_SECONDS=10
    volumes:
      - ./backend:/app
      - ./autograder_ai:/autograder_ai
      - media_data:/app/media
      - ./app/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/gradesync_sandbox:/tmp/gradesync_sandbox
    depends_on:
      - db
      - redis
    command: celery -A config worker --loglevel=info

volumes:
  postgres_data:
  redis_data:
  media_data:

